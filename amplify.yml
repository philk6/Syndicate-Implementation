version: 1
backend:
  phases:
    build:
      commands:
        - amplifyPush --simple # Generates amplify_outputs.json
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - cp amplify_outputs.json ./app/ # Match import path
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*