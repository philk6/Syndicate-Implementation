version: 1
backend:
  phases:
    build:
      commands:
        - amplifyPush --simple
        - if [ -f amplify_outputs.json ]; then cp amplify_outputs.json ./app/; else echo "amplify_outputs.json not found" && ls -R > build_output.txt; fi
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
    cache:
      paths:
        - node_modules/**/*