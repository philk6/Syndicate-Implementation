version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd syndicate
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: syndicate
        files:
          - '.next/**/*'
          - 'public/**/*'
          - 'package.json'
          - 'node_modules/**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: syndicate